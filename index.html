<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eduAmarks</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- ==========================================
         CSS STYLES & ANIMATIONS
         ========================================== -->
    <style>
        /* Theme Variables */
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --primary-bg: #2563eb;
            --primary-text: #ffffff;
            --primary-hover: #1d4ed8;
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        body.theme-dark {
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --card-bg: #1e293b;
            --card-border: #334155;
            --primary-bg: #6366f1;
            --primary-text: #ffffff;
            --primary-hover: #4f46e5;
            --nav-bg: rgba(15, 23, 42, 0.8);
        }

        body.theme-ocean {
            --bg-color: #083344;
            --text-color: #ecfeff;
            --card-bg: #164e63;
            --card-border: #155e75;
            --primary-bg: #06b6d4;
            --primary-text: #083344;
            --primary-hover: #22d3ee;
            --nav-bg: rgba(8, 51, 68, 0.8);
        }

        body.theme-midnight {
            --bg-color: #4a044e;
            --text-color: #fdf4ff;
            --card-bg: #701a75;
            --card-border: #86198f;
            --primary-bg: #d946ef;
            --primary-text: #ffffff;
            --primary-hover: #e879f9;
            --nav-bg: rgba(74, 4, 78, 0.8);
        }

        /* Themed Classes */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.5s, color 0.5s;
        }
        .themed-card { background-color: var(--card-bg); border-color: var(--card-border); }
        .themed-btn { background-color: var(--primary-bg); color: var(--primary-text); }
        .themed-btn:hover { background-color: var(--primary-hover); }
        .themed-border { border-color: var(--card-border); }
        .themed-text-primary { color: var(--primary-bg); }
        .nav-active { border-bottom: 2px solid var(--primary-bg); color: var(--primary-bg); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-in { animation: slideIn 0.4s ease-out forwards; }

        /* FIXED 3D Flip Utilities */
        .perspective-1000 { perspective: 1000px; }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card-inner.is-flipped { transform: rotateY(180deg); }
        
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .flip-card-back { transform: rotateY(180deg); }
        
        /* Rich Text Editor Overrides */
        #editor-content:empty:before { content: attr(data-placeholder); color: gray; opacity: 0.6; }
        #editor-content { min-height: 400px; outline: none; }
        #editor-content ul { list-style-type: disc; margin-left: 2rem; }
        #editor-content ol { list-style-type: decimal; margin-left: 2rem; }

        /* Masonry Grid for Planner */
        .masonry-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); grid-auto-rows: max-content; gap: 1rem; }

        /* Cloud Sync Indicator */
        #sync-status { transition: opacity 0.3s; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans theme-light">

    <!-- ==========================================
         HTML STRUCTURE
         ========================================== -->
    <header class="border-b sticky top-0 z-40 backdrop-blur-md themed-border" style="background-color: var(--nav-bg);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo & Brand -->
                <div class="flex items-center gap-3 cursor-pointer" onclick="app.navigate('home')">
                    <img src="/assets/logo.png" alt="eduAmarks Logo" class="w-8 h-8 rounded-lg object-cover" 
                         onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'40\' height=\'40\'><rect width=\'40\' height=\'40\' fill=\'%232563eb\' rx=\'8\'/><text x=\'50%\' y=\'50%\' fill=\'white\' font-size=\'20\' font-family=\'sans-serif\' text-anchor=\'middle\' dy=\'.3em\'>E</text></svg>'">
                    <h1 class="text-xl font-extrabold tracking-tight">eduAmarks</h1>
                </div>

                <!-- Desktop Nav Links -->
                <nav class="hidden md:flex space-x-8" id="desktop-nav">
                    <button onclick="app.navigate('home')" class="nav-btn px-1 py-5 text-sm font-medium transition-colors hover:text-blue-500" data-page="home">Home</button>
                    <button onclick="app.navigate('flashcards')" class="nav-btn px-1 py-5 text-sm font-medium transition-colors hover:text-blue-500" data-page="flashcards">Flashcards</button>
                    <button onclick="app.navigate('notes')" class="nav-btn px-1 py-5 text-sm font-medium transition-colors hover:text-blue-500" data-page="notes">Notes</button>
                    <button onclick="app.navigate('planner')" class="nav-btn px-1 py-5 text-sm font-medium transition-colors hover:text-blue-500" data-page="planner">Planner</button>
                    <button onclick="app.navigate('about')" class="nav-btn px-1 py-5 text-sm font-medium transition-colors hover:text-blue-500" data-page="about">About Us</button>
                </nav>

                <!-- Actions -->
                <div class="flex items-center gap-2">
                    <!-- Cloud Sync Indicator -->
                    <div id="sync-status" class="opacity-0 flex items-center gap-1 text-xs font-bold text-green-500 mr-2">
                        <i data-lucide="cloud-check" class="w-4 h-4"></i> Saved
                    </div>
                    <button onclick="app.toggleSettings()" class="p-2 rounded-xl border-2 border-transparent hover:bg-black/10 transition-all">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </button>
                    <!-- Mobile menu button -->
                    <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden p-2 rounded-xl border-2 border-transparent hover:bg-black/10 transition-all">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t themed-border bg-inherit">
            <div class="px-2 pt-2 pb-3 space-y-1" id="mobile-nav">
                <button onclick="app.navigate('home'); document.getElementById('mobile-menu').classList.add('hidden')" class="w-full text-left px-3 py-2 rounded-md text-base font-medium hover:bg-black/5">Home</button>
                <button onclick="app.navigate('flashcards'); document.getElementById('mobile-menu').classList.add('hidden')" class="w-full text-left px-3 py-2 rounded-md text-base font-medium hover:bg-black/5">Flashcards</button>
                <button onclick="app.navigate('notes'); document.getElementById('mobile-menu').classList.add('hidden')" class="w-full text-left px-3 py-2 rounded-md text-base font-medium hover:bg-black/5">Notes</button>
                <button onclick="app.navigate('planner'); document.getElementById('mobile-menu').classList.add('hidden')" class="w-full text-left px-3 py-2 rounded-md text-base font-medium hover:bg-black/5">Planner</button>
                <button onclick="app.navigate('about'); document.getElementById('mobile-menu').classList.add('hidden')" class="w-full text-left px-3 py-2 rounded-md text-base font-medium hover:bg-black/5">About Us</button>
            </div>
        </div>
    </header>

    <main id="app-main" class="flex-1 w-full flex flex-col items-center justify-start p-6 md:p-10">
        <!-- Views injected here by JS -->
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="w-full max-w-md rounded-3xl p-8 shadow-2xl border themed-card relative animate-fade-in">
            <button onclick="app.toggleSettings()" class="absolute top-6 right-6 p-2 rounded-full hover:bg-black/10 transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <h2 class="text-2xl font-bold mb-8 flex items-center gap-3">
                <i data-lucide="settings" class="w-6 h-6"></i> Settings
            </h2>
            <div class="space-y-6">
                <div class="space-y-3">
                    <label class="text-sm font-bold uppercase tracking-wider flex items-center gap-2 opacity-70">
                        <i data-lucide="palette" class="w-4 h-4"></i> Theme
                    </label>
                    <div class="grid grid-cols-2 gap-2" id="theme-options"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         JAVASCRIPT LOGIC & DATABASE
         ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Database Setup ---
        let db, auth, currentUser;
        let saveTimeout = null;

        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            if (firebaseConfig) {
                const firebaseApp = initializeApp(firebaseConfig);
                auth = getAuth(firebaseApp);
                db = getFirestore(firebaseApp);
                
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        window.app.loadData();
                    }
                });
                
                initAuth();
            }
        } catch(e) { console.error("Database init error", e); }

        // --- Default Application State ---
        const defaultCards = [
            { id: '1', term: 'Photosynthesis', def: 'The process by which plants use sunlight to synthesize foods from carbon dioxide and water.' },
            { id: '2', term: 'Mitochondria', def: 'An organelle found in large numbers in most cells, in which the biochemical processes of respiration occur.' }
        ];

        const state = {
            currentPage: 'home',
            theme: 'light',
            
            // Flashcards
            cards: [...defaultCards],
            fcMode: 'edit',
            fcStudyType: 'flip',
            fcAnimation: 'flip',
            fcCurrentIndex: 0,
            fcIsFlipped: false,
            fcScore: 0,
            fcSessionComplete: false,
            fcMcqOptions: [],
            fcAnsweredState: null,
            fcTypingInput: "",

            // Notes
            notes: [
                { id: '1', title: 'Welcome to Notes', content: '<b>Welcome!</b><ul><li>Start typing here to organize your thoughts.</li><li>Use the toolbar above to format.</li></ul>' }
            ],
            activeNoteId: '1',

            // Planner
            plannerItems: [
                { id: '1', text: 'Welcome to your Planner! Click Add to create a new task.', color: 'bg-blue-100 text-blue-900 border-blue-200' }
            ]
        };

        const plannerColors = [
            'bg-white text-gray-900 border-gray-200',
            'bg-blue-100 text-blue-900 border-blue-200',
            'bg-red-100 text-red-900 border-red-200',
            'bg-green-100 text-green-900 border-green-200',
            'bg-yellow-100 text-yellow-900 border-yellow-200',
            'bg-purple-100 text-purple-900 border-purple-200',
        ];

        // --- Application Logic ---
        window.app = {
            init() {
                // Check URL for shared flashcard data
                const params = new URLSearchParams(window.location.search);
                const data = params.get('data');
                if (data) {
                    try {
                        const decoded = JSON.parse(decodeURIComponent(atob(data)));
                        if (Array.isArray(decoded) && decoded.length > 0) {
                            state.cards = decoded;
                            state.currentPage = 'flashcards';
                        }
                    } catch (e) { console.error("Failed to load shared deck", e); }
                }

                this.applyTheme();
                this.render();
                lucide.createIcons();
            },

            // --- Database Methods ---
            async loadData() {
                if (!currentUser || !db) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'eduAmarks', 'userData');
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.cards) state.cards = data.cards;
                        if (data.notes) {
                            state.notes = data.notes;
                            if(state.notes.length > 0) state.activeNoteId = state.notes[0].id;
                        }
                        if (data.plannerItems) state.plannerItems = data.plannerItems;
                        if (data.theme) {
                            state.theme = data.theme;
                            this.applyTheme();
                        }
                        this.render();
                    }
                } catch (e) { console.error("Error loading data", e); }
            },

            saveData() {
                if (!currentUser || !db) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(async () => {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'eduAmarks', 'userData');
                        await setDoc(docRef, {
                            cards: state.cards,
                            notes: state.notes,
                            plannerItems: state.plannerItems,
                            theme: state.theme
                        });
                        
                        // Show sync indicator
                        const syncStatus = document.getElementById('sync-status');
                        syncStatus.style.opacity = '1';
                        setTimeout(() => syncStatus.style.opacity = '0', 2000);
                        
                    } catch(e) { console.error("Error saving data", e); }
                }, 800); // 800ms debounce
            },

            // --- Core Routing & Theme ---
            navigate(page) {
                state.currentPage = page;
                this.updateNavHighlight();
                this.render();
            },

            updateNavHighlight() {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    if (btn.dataset.page === state.currentPage) btn.classList.add('nav-active');
                    else btn.classList.remove('nav-active');
                });
            },

            toggleSettings() {
                const modal = document.getElementById('settings-modal');
                if (modal.classList.contains('hidden')) {
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    this.renderSettings();
                } else {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }
            },

            setTheme(t) { 
                state.theme = t; 
                this.applyTheme(); 
                this.renderSettings(); 
                this.saveData();
            },

            applyTheme() {
                document.body.className = `min-h-screen flex flex-col font-sans theme-${state.theme}`;
            },

            renderSettings() {
                const themes = ['light', 'dark', 'ocean', 'midnight'];
                document.getElementById('theme-options').innerHTML = themes.map(th => 
                    `<button onclick="app.setTheme('${th}')" class="p-3 rounded-xl border-2 font-medium capitalize transition-all ${state.theme === th ? 'themed-btn themed-border' : 'border-transparent bg-black/5 hover:bg-black/10'}">${th}</button>`
                ).join('');
                lucide.createIcons();
            },

            render() {
                const main = document.getElementById('app-main');
                this.updateNavHighlight();
                
                switch(state.currentPage) {
                    case 'home': main.innerHTML = this.viewHome(); break;
                    case 'flashcards': main.innerHTML = this.viewFlashcards(); break;
                    case 'notes': main.innerHTML = this.viewNotes(); break;
                    case 'planner': main.innerHTML = this.viewPlanner(); break;
                    case 'about': main.innerHTML = this.viewAbout(); break;
                    default: main.innerHTML = this.viewHome();
                }
                lucide.createIcons();
            },

            // --- Views ---
            viewHome() {
                return `
                    <div class="w-full max-w-5xl mx-auto space-y-12 animate-fade-in py-10">
                        <div class="text-center space-y-6">
                            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight">Welcome to <span class="themed-text-primary">eduAmarks</span></h1>
                            <p class="text-xl opacity-70 max-w-2xl mx-auto">Your all-in-one student workspace. Master your subjects with flashcards, organize thoughts with rich notes, and keep track of your tasks automatically saved to the cloud.</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-8">
                            <div onclick="app.navigate('flashcards')" class="p-8 rounded-3xl border themed-card themed-border cursor-pointer hover:shadow-xl transition-all hover:-translate-y-1 group">
                                <div class="w-14 h-14 rounded-2xl flex items-center justify-center themed-btn mb-6 group-hover:scale-110 transition-transform"><i data-lucide="layers" class="w-7 h-7"></i></div>
                                <h3 class="text-2xl font-bold mb-3">Flashcards</h3>
                                <p class="opacity-70">Create, edit, and study custom decks. Features 3D flipping, MCQ, and typing practice.</p>
                            </div>
                            <div onclick="app.navigate('notes')" class="p-8 rounded-3xl border themed-card themed-border cursor-pointer hover:shadow-xl transition-all hover:-translate-y-1 group">
                                <div class="w-14 h-14 rounded-2xl flex items-center justify-center themed-btn mb-6 group-hover:scale-110 transition-transform"><i data-lucide="file-text" class="w-7 h-7"></i></div>
                                <h3 class="text-2xl font-bold mb-3">Smart Notes</h3>
                                <p class="opacity-70">Rich text editor for your class notes. Format easily and keep everything organized in one place.</p>
                            </div>
                            <div onclick="app.navigate('planner')" class="p-8 rounded-3xl border themed-card themed-border cursor-pointer hover:shadow-xl transition-all hover:-translate-y-1 group">
                                <div class="w-14 h-14 rounded-2xl flex items-center justify-center themed-btn mb-6 group-hover:scale-110 transition-transform"><i data-lucide="layout-grid" class="w-7 h-7"></i></div>
                                <h3 class="text-2xl font-bold mb-3">Planner Board</h3>
                                <p class="opacity-70">A sticky-note style board to track assignments, reminders, and daily tasks quickly.</p>
                            </div>
                        </div>
                    </div>
                `;
            },

            viewAbout() {
                return `
                    <div class="w-full max-w-3xl mx-auto animate-fade-in py-10 space-y-8">
                        <div class="text-center">
                            <h2 class="text-4xl font-bold mb-4">About eduAmarks</h2>
                            <p class="text-lg opacity-70">Empowering students through better tools.</p>
                        </div>
                        <div class="p-8 rounded-3xl border themed-card themed-border space-y-6">
                            <p class="text-lg leading-relaxed">
                                Developed collaboratively by a dedicated team of high school students. Our mission is to provide a lightweight, aesthetically pleasing, and highly effective learning platform. 
                            </p>
                            <p class="text-lg leading-relaxed">
                                Initially starting as "Lumina Flashcards", we rebranded to <strong>eduAmarks</strong> to reflect our expanded suite of tools: integrated notes, task planner, and seamless cloud persistence so your data goes wherever you do.
                            </p>
                        </div>
                    </div>
                `;
            },

            // --- Planner Logic ---
            viewPlanner() {
                const itemsHtml = state.plannerItems.map(item => `
                    <div class="p-5 rounded-2xl border ${item.color} shadow-sm relative group animate-fade-in">
                        <button onclick="app.deletePlannerItem('${item.id}')" class="absolute top-3 right-3 p-1.5 rounded-full bg-white/50 hover:bg-red-500 hover:text-white transition-colors opacity-0 group-hover:opacity-100">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                        <p class="whitespace-pre-wrap pr-6 font-medium">${item.text}</p>
                    </div>
                `).join('');

                const colorSelectors = plannerColors.map(color => `
                    <div onclick="document.getElementById('planner-color').value = '${color}'; document.querySelectorAll('.color-opt').forEach(el=>el.classList.remove('ring-2', 'ring-offset-2', 'ring-blue-500')); this.classList.add('ring-2', 'ring-offset-2', 'ring-blue-500');" 
                         class="color-opt w-8 h-8 rounded-full cursor-pointer border shadow-sm ${color} ${color === plannerColors[0] ? 'ring-2 ring-offset-2 ring-blue-500' : ''}"></div>
                `).join('');

                return `
                    <div class="w-full max-w-6xl mx-auto animate-fade-in space-y-8">
                        <h2 class="text-3xl font-bold flex items-center gap-3"><i data-lucide="layout-grid" class="w-8 h-8 themed-text-primary"></i> Planner Board</h2>
                        <div class="w-full max-w-2xl mx-auto p-2 rounded-2xl border themed-card themed-border shadow-md focus-within:shadow-xl transition-shadow relative z-10">
                            <textarea id="planner-input" placeholder="Take a note or add a task..." class="w-full p-4 bg-transparent resize-none outline-none min-h-[60px]" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                            <input type="hidden" id="planner-color" value="${plannerColors[0]}">
                            <div class="flex items-center justify-between px-4 pb-2">
                                <div class="flex gap-2">${colorSelectors}</div>
                                <button onclick="app.addPlannerItem()" class="px-5 py-2 rounded-xl font-bold themed-btn">Add</button>
                            </div>
                        </div>
                        <div class="masonry-grid pt-4">${itemsHtml}</div>
                    </div>
                `;
            },
            
            addPlannerItem() {
                const input = document.getElementById('planner-input');
                const color = document.getElementById('planner-color').value;
                if (!input.value.trim()) return;
                
                state.plannerItems.unshift({ id: Date.now().toString(), text: input.value.trim(), color: color });
                this.saveData();
                this.render();
            },

            deletePlannerItem(id) {
                state.plannerItems = state.plannerItems.filter(item => item.id !== id);
                this.saveData();
                this.render();
            },

            // --- Notes Logic ---
            viewNotes() {
                const activeNote = state.notes.find(n => n.id === state.activeNoteId) || state.notes[0];
                const sidebarHtml = state.notes.map(note => `
                    <div onclick="app.setActiveNote('${note.id}')" class="p-3 rounded-xl cursor-pointer truncate transition-colors ${state.activeNoteId === note.id ? 'themed-btn' : 'hover:bg-black/5'}">
                        ${note.title || 'Untitled Note'}
                    </div>
                `).join('');

                return `
                    <div class="w-full max-w-6xl mx-auto h-[80vh] flex flex-col md:flex-row gap-6 animate-fade-in">
                        <div class="w-full md:w-64 flex flex-col gap-4 border-r pr-4 themed-border h-full overflow-y-auto">
                            <div class="flex items-center justify-between pb-2 border-b themed-border">
                                <h3 class="font-bold text-lg uppercase tracking-wider opacity-70">My Notes</h3>
                                <button onclick="app.addNote()" class="p-1.5 rounded-lg hover:bg-black/10 transition-colors"><i data-lucide="plus" class="w-5 h-5"></i></button>
                            </div>
                            <div class="flex-1 space-y-1">${sidebarHtml}</div>
                        </div>

                        <div class="flex-1 flex flex-col rounded-3xl border themed-card themed-border overflow-hidden h-full shadow-sm">
                            <div class="p-3 border-b themed-border bg-black/5 flex flex-wrap gap-2 items-center">
                                <input type="text" id="note-title" value="${activeNote ? activeNote.title : ''}" oninput="app.updateNoteTitle(this.value)" class="bg-transparent font-bold text-xl outline-none mr-4 min-w-[200px]" placeholder="Note Title...">
                                <div class="h-6 w-px bg-gray-300 mx-2"></div>
                                <button onclick="app.formatNote('bold')" class="p-2 rounded hover:bg-black/10" title="Bold"><i data-lucide="bold" class="w-4 h-4"></i></button>
                                <button onclick="app.formatNote('italic')" class="p-2 rounded hover:bg-black/10" title="Italic"><i data-lucide="italic" class="w-4 h-4"></i></button>
                                <button onclick="app.formatNote('underline')" class="p-2 rounded hover:bg-black/10" title="Underline"><i data-lucide="underline" class="w-4 h-4"></i></button>
                                <div class="h-6 w-px bg-gray-300 mx-1"></div>
                                <button onclick="app.formatNote('insertUnorderedList')" class="p-2 rounded hover:bg-black/10" title="Bullet List"><i data-lucide="list" class="w-4 h-4"></i></button>
                                <button onclick="app.formatNote('insertOrderedList')" class="p-2 rounded hover:bg-black/10" title="Numbered List"><i data-lucide="list-ordered" class="w-4 h-4"></i></button>
                                <div class="flex-1"></div>
                                <button onclick="app.deleteNote('${state.activeNoteId}')" class="p-2 rounded hover:bg-red-500/10 text-red-500" title="Delete Note"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                            <div id="editor-content" contenteditable="true" oninput="app.updateNoteContent(this.innerHTML)" class="p-6 flex-1 overflow-y-auto" data-placeholder="Start typing your notes here...">${activeNote ? activeNote.content : ''}</div>
                        </div>
                    </div>
                `;
            },

            addNote() {
                const newNote = { id: Date.now().toString(), title: 'New Note', content: '' };
                state.notes.push(newNote);
                state.activeNoteId = newNote.id;
                this.saveData();
                this.render();
            },
            setActiveNote(id) { state.activeNoteId = id; this.render(); },
            deleteNote(id) {
                if (state.notes.length <= 1) return;
                state.notes = state.notes.filter(n => n.id !== id);
                state.activeNoteId = state.notes[0].id;
                this.saveData();
                this.render();
            },
            updateNoteTitle(title) {
                const note = state.notes.find(n => n.id === state.activeNoteId);
                if (note) note.title = title;
                const sidebarItems = document.querySelectorAll('.md\\:w-64 .themed-btn');
                if(sidebarItems.length > 0) sidebarItems[0].innerText = title || 'Untitled Note';
                this.saveData();
            },
            updateNoteContent(content) {
                const note = state.notes.find(n => n.id === state.activeNoteId);
                if (note) note.content = content;
                this.saveData();
            },
            formatNote(command) {
                document.execCommand(command, false, null);
                document.getElementById('editor-content').focus();
            },

            // --- Flashcard Logic ---
            viewFlashcards() { return state.fcMode === 'edit' ? this.fcGetEditorHTML() : this.fcGetStudyHTML(); },
            fcUpdateCard(id, field, value) {
                const card = state.cards.find(c => c.id === id);
                if (card) { card[field] = value; this.saveData(); }
            },
            fcAddCard() { state.cards.push({ id: Date.now().toString(), term: '', def: '' }); this.saveData(); this.render(); },
            fcDeleteCard(id) { state.cards = state.cards.filter(c => c.id !== id); this.saveData(); this.render(); },
            fcSetMode(mode) {
                state.fcMode = mode;
                if (mode === 'study') { state.fcCurrentIndex = 0; state.fcScore = 0; state.fcSessionComplete = false; this.fcResetStudyCard(); }
                this.render();
            },
            fcResetStudyCard() {
                state.fcIsFlipped = false; state.fcAnsweredState = null; state.fcTypingInput = "";
                if (state.fcStudyType === 'mcq') this.fcGenerateMCQ();
            },
            fcNextCard() {
                if (state.fcCurrentIndex < state.cards.length - 1) { state.fcCurrentIndex++; this.fcResetStudyCard(); } 
                else { state.fcSessionComplete = true; }
                this.render();
            },
            fcPrevCard() {
                if (state.fcCurrentIndex > 0) { state.fcCurrentIndex--; this.fcResetStudyCard(); this.render(); }
            },
            fcToggleFlip() { if (state.fcStudyType === 'flip') { state.fcIsFlipped = !state.fcIsFlipped; this.render(); } },
            fcSetStudyType(t) { state.fcStudyType = t; if(state.fcMode === 'study') this.fcResetStudyCard(); this.render(); },
            fcSetAnimation(a) { state.fcAnimation = a; this.render(); },
            fcGenerateMCQ() {
                if (state.cards.length === 0) return;
                const currentDef = state.cards[state.fcCurrentIndex].def;
                let others = state.cards.filter((_, i) => i !== state.fcCurrentIndex).map(c => c.def);
                others.sort(() => 0.5 - Math.random());
                let options = [currentDef, ...others.slice(0, 3)];
                options.sort(() => 0.5 - Math.random());
                state.fcMcqOptions = options;
            },
            fcAnswerMCQ(option) {
                if (state.fcAnsweredState) return;
                const isCorrect = option === state.cards[state.fcCurrentIndex].def;
                state.fcAnsweredState = isCorrect ? 'correct' : 'incorrect';
                if (isCorrect) state.fcScore++;
                this.render();
            },
            fcSubmitTyping(e) {
                e.preventDefault();
                if (state.fcAnsweredState) { this.fcNextCard(); return; }
                const correctDef = state.cards[state.fcCurrentIndex].def.trim().toLowerCase();
                const userDef = state.fcTypingInput.trim().toLowerCase();
                const isCorrect = correctDef === userDef || (userDef.length > 3 && correctDef.includes(userDef));
                state.fcAnsweredState = isCorrect ? 'correct' : 'incorrect';
                if (isCorrect) state.fcScore++;
                this.render();
            },

            fcGetEditorHTML() {
                let cardsHtml = state.cards.map((card, index) => `
                    <div class="p-5 rounded-2xl shadow-sm border themed-card themed-border flex flex-col md:flex-row gap-4 relative group">
                        <span class="absolute -left-3 -top-3 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shadow-sm bg-inherit border inherit themed-card">${index + 1}</span>
                        <div class="flex-1 space-y-2">
                            <label class="text-sm opacity-70 font-semibold uppercase tracking-wider">Term</label>
                            <input type="text" value="${card.term.replace(/"/g, '&quot;')}" oninput="app.fcUpdateCard('${card.id}', 'term', this.value)" class="w-full p-3 rounded-lg bg-transparent border-2 focus:outline-none transition-colors themed-border focus:border-current" placeholder="e.g. Mitochondria">
                        </div>
                        <div class="flex-1 space-y-2">
                            <label class="text-sm opacity-70 font-semibold uppercase tracking-wider">Definition</label>
                            <textarea oninput="app.fcUpdateCard('${card.id}', 'def', this.value)" class="w-full p-3 rounded-lg bg-transparent border-2 focus:outline-none transition-colors resize-none h-[52px] themed-border focus:border-current" placeholder="e.g. Powerhouse of the cell">${card.def}</textarea>
                        </div>
                        <button onclick="app.fcDeleteCard('${card.id}')" class="mt-6 md:mt-8 p-3 rounded-lg hover:bg-red-500/10 text-red-500 transition-colors self-end md:self-center opacity-50 hover:opacity-100" title="Delete Card"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                `).join('');

                return `
                    <div class="w-full max-w-4xl mx-auto space-y-6 animate-fade-in pb-10">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                            <h2 class="text-3xl font-bold flex items-center gap-3"><i data-lucide="layers" class="w-8 h-8 themed-text-primary"></i> Deck Editor</h2>
                            <div class="flex items-center gap-2">
                                <button onclick="app.fcShareDeck()" id="share-btn" class="flex items-center gap-2 px-4 py-2 rounded-xl font-bold border-2 themed-border hover:bg-black/5 transition-colors">
                                    <i data-lucide="share-2" id="share-icon" class="w-5 h-5"></i> <span id="share-text">Share</span>
                                </button>
                                <button onclick="app.fcSetMode('study')" ${state.cards.length === 0 ? 'disabled' : ''} class="flex items-center gap-2 px-6 py-2 rounded-xl font-bold shadow-lg transition-transform hover:scale-105 disabled:opacity-50 disabled:hover:scale-100 themed-btn">
                                    <i data-lucide="play" class="w-5 h-5 fill-current"></i> Start Study
                                </button>
                            </div>
                        </div>
                        <div class="space-y-4">${cardsHtml}</div>
                        <button onclick="app.fcAddCard()" class="w-full py-5 rounded-2xl border-2 border-dashed flex items-center justify-center gap-2 font-bold opacity-70 hover:opacity-100 transition-all themed-border hover:bg-black/5">
                            <i data-lucide="plus" class="w-6 h-6"></i> Add New Card
                        </button>
                    </div>
                `;
            },

            fcGetStudyHTML() {
                if (state.fcSessionComplete) {
                    return `
                        <div class="w-full max-w-2xl mx-auto p-10 text-center rounded-3xl shadow-xl border themed-card themed-border animate-fade-in mt-10">
                            <i data-lucide="check-circle-2" class="w-24 h-24 mx-auto mb-6 opacity-80 themed-text-primary"></i>
                            <h2 class="text-4xl font-bold mb-4">Study Session Complete!</h2>
                            ${(state.fcStudyType === 'mcq' || state.fcStudyType === 'typing') ? `<div class="mb-8 text-2xl"><span class="opacity-70">Your Score:</span> <span class="font-bold ml-2 text-3xl">${state.fcScore} / ${state.cards.length}</span></div>` : ''}
                            <div class="flex justify-center gap-4 mt-8">
                                <button onclick="app.fcSetMode('study')" class="px-8 py-3 rounded-xl font-bold flex items-center gap-2 themed-btn"><i data-lucide="rotate-ccw" class="w-5 h-5"></i> Restart</button>
                                <button onclick="app.fcSetMode('edit')" class="px-8 py-3 rounded-xl font-bold border-2 flex items-center gap-2 hover:bg-black/5"><i data-lucide="x" class="w-5 h-5"></i> Editor</button>
                            </div>
                        </div>
                    `;
                }

                const card = state.cards[state.fcCurrentIndex];
                let cardContentHtml = '';
                const studyToolbarHtml = `
                    <div class="w-full max-w-3xl flex flex-wrap gap-2 mb-6 p-2 rounded-xl border themed-border bg-black/5">
                        <button onclick="app.fcSetStudyType('flip')" class="px-4 py-2 rounded-lg text-sm font-bold ${state.fcStudyType === 'flip' ? 'themed-card shadow' : 'opacity-60'}">Flip</button>
                        <button onclick="app.fcSetStudyType('mcq')" class="px-4 py-2 rounded-lg text-sm font-bold ${state.fcStudyType === 'mcq' ? 'themed-card shadow' : 'opacity-60'}">MCQ</button>
                        <button onclick="app.fcSetStudyType('typing')" class="px-4 py-2 rounded-lg text-sm font-bold ${state.fcStudyType === 'typing' ? 'themed-card shadow' : 'opacity-60'}">Typing</button>
                        ${state.fcStudyType === 'flip' ? `
                            <div class="w-px bg-gray-300 mx-2 my-1"></div>
                            <button onclick="app.fcSetAnimation('flip')" class="px-3 py-1 rounded text-xs ${state.fcAnimation === 'flip' ? 'bg-black/10' : 'opacity-50'}">3D</button>
                            <button onclick="app.fcSetAnimation('fade')" class="px-3 py-1 rounded text-xs ${state.fcAnimation === 'fade' ? 'bg-black/10' : 'opacity-50'}">Fade</button>
                            <button onclick="app.fcSetAnimation('slide')" class="px-3 py-1 rounded text-xs ${state.fcAnimation === 'slide' ? 'bg-black/10' : 'opacity-50'}">Slide</button>
                        ` : ''}
                    </div>
                `;

                if (state.fcStudyType === 'flip') {
                    if (state.fcAnimation === 'flip') {
                        // FIXED 3D IMPLEMENTATION
                        cardContentHtml = `
                            <div class="w-full h-[400px] cursor-pointer perspective-1000" onclick="app.fcToggleFlip()">
                                <div class="flip-card-inner ${state.fcIsFlipped ? 'is-flipped' : ''}">
                                    <div class="flip-card-front p-10 rounded-3xl shadow-xl border flex items-center justify-center text-center themed-card themed-border">
                                        <h3 class="text-4xl md:text-5xl font-bold leading-tight">${card.term}</h3>
                                    </div>
                                    <div class="flip-card-back p-10 rounded-3xl shadow-xl border flex items-center justify-center text-center themed-card themed-border">
                                        <p class="text-2xl md:text-3xl font-medium leading-relaxed">${card.def}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        // Fade or Slide
                        const isFadedOrSlid = state.fcIsFlipped;
                        let innerStyles = '';
                        if (state.fcAnimation === 'fade' && isFadedOrSlid) innerStyles = 'opacity: 0; animation: fadeIn 0.4s forwards;';
                        if (state.fcAnimation === 'slide' && isFadedOrSlid) innerStyles = 'transform: translateX(-20px); animation: slideIn 0.4s forwards;';

                        cardContentHtml = `
                            <div class="w-full h-[400px] cursor-pointer group" onclick="app.fcToggleFlip()">
                                <div class="w-full h-full relative">
                                    <div class="absolute inset-0 p-10 rounded-3xl shadow-xl border flex items-center justify-center text-center themed-card themed-border transition-opacity duration-300 ${isFadedOrSlid ? 'hidden' : 'animate-fade-in'}" style="${!isFadedOrSlid ? innerStyles : ''}">
                                        <h3 class="text-4xl md:text-5xl font-bold leading-tight">${card.term}</h3>
                                    </div>
                                    <div class="absolute inset-0 p-10 rounded-3xl shadow-xl border flex items-center justify-center text-center themed-card themed-border transition-opacity duration-300 ${isFadedOrSlid ? 'animate-fade-in' : 'hidden'}" style="${isFadedOrSlid ? innerStyles : ''}">
                                        <p class="text-2xl md:text-3xl font-medium leading-relaxed">${card.def}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                } else if (state.fcStudyType === 'mcq') {
                    let optionsHtml = state.fcMcqOptions.map((opt) => {
                        const isSelectedAndCorrect = state.fcAnsweredState !== null && opt === card.def;
                        const isIncorrect = state.fcAnsweredState === 'incorrect' && opt !== card.def;
                        let btnClass = `p-6 rounded-xl border-2 text-left transition-all text-lg font-medium `;
                        if (state.fcAnsweredState === null) btnClass += `hover:bg-black/5 themed-border`;
                        if (isSelectedAndCorrect) btnClass += `bg-green-500/20 border-green-500 text-green-700`;
                        if (isIncorrect) btnClass += `opacity-40 themed-border`;
                        return `<button onclick="app.fcAnswerMCQ('${opt.replace(/'/g, "\\'")}')" class="${btnClass}" ${state.fcAnsweredState !== null ? 'disabled' : ''}>${opt}</button>`;
                    }).join('');

                    cardContentHtml = `<div class="w-full min-h-[400px] p-8 rounded-3xl shadow-xl border themed-card themed-border flex flex-col animate-slide-in"><h3 class="text-4xl font-bold text-center mb-8 pt-6">${card.term}</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1">${optionsHtml}</div></div>`;
                } else if (state.fcStudyType === 'typing') {
                    let inputClass = `w-full p-6 rounded-xl border-2 bg-transparent text-xl transition-all resize-none h-32 focus:outline-none focus:border-current `;
                    if (state.fcAnsweredState === 'correct') inputClass += 'border-green-500 text-green-600';
                    else if (state.fcAnsweredState === 'incorrect') inputClass += 'border-red-500 text-red-600';
                    else inputClass += 'themed-border';

                    cardContentHtml = `
                        <div class="w-full min-h-[400px] p-8 rounded-3xl shadow-xl border themed-card themed-border flex flex-col animate-fade-in">
                            <h3 class="text-4xl font-bold text-center mb-8 pt-6">${card.term}</h3>
                            <form onsubmit="app.fcSubmitTyping(event)" class="space-y-6 w-full max-w-xl mx-auto flex flex-col">
                                <textarea oninput="state.fcTypingInput = this.value" ${state.fcAnsweredState !== null ? 'disabled' : ''} placeholder="Type definition..." class="${inputClass}">${state.fcTypingInput}</textarea>
                                ${state.fcAnsweredState === null ? `<button type="submit" class="w-full py-4 rounded-xl font-bold text-lg themed-btn">Submit</button>` : `
                                    <div class="animate-fade-in space-y-4 text-center">
                                        <div class="p-4 rounded-xl font-bold text-lg ${state.fcAnsweredState === 'correct' ? 'bg-green-500/20 text-green-600' : 'bg-red-500/20 text-red-600'}">${state.fcAnsweredState === 'correct' ? 'Correct!' : 'Incorrect'}</div>
                                        ${state.fcAnsweredState === 'incorrect' ? `<div class="p-4 bg-black/5 rounded-xl text-left border themed-border"><span class="font-bold opacity-70">Answer:</span> ${card.def}</div>` : ''}
                                        <button type="submit" class="w-full py-4 rounded-xl font-bold text-lg mt-4 themed-btn">Next</button>
                                    </div>
                                `}
                            </form>
                        </div>
                    `;
                }

                const progressPercent = ((state.fcCurrentIndex + 1) / state.cards.length) * 100;
                return `
                    <div class="w-full max-w-3xl mx-auto flex flex-col items-center pt-6">
                        ${studyToolbarHtml}
                        <div class="w-full flex items-center gap-4 mb-6">
                            <span class="font-bold w-12 text-right">${state.fcCurrentIndex + 1}</span>
                            <div class="flex-1 h-3 rounded-full overflow-hidden border themed-border bg-black/10">
                                <div class="h-full transition-all duration-500 themed-btn" style="width: ${progressPercent}%"></div>
                            </div>
                            <span class="font-bold w-12">${state.cards.length}</span>
                        </div>
                        ${cardContentHtml}
                        <div class="flex items-center justify-between w-full max-w-3xl mt-8">
                            <button onclick="app.fcPrevCard()" ${state.fcCurrentIndex === 0 ? 'disabled' : ''} class="p-4 rounded-full border-2 border-transparent hover:bg-black/5 disabled:opacity-30 disabled:hover:bg-transparent transition-all"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
                            <button onclick="app.fcSetMode('edit')" class="px-6 py-2 rounded-lg font-bold opacity-50 hover:opacity-100 hover:bg-black/5 transition-all">Back to Editor</button>
                            <button onclick="app.fcNextCard()" ${state.fcAnsweredState === null && (state.fcStudyType === 'mcq' || state.fcStudyType === 'typing') ? 'disabled' : ''} class="p-4 rounded-full border-2 border-transparent transition-all ${(state.fcAnsweredState !== null || state.fcStudyType === 'flip') ? 'hover:bg-black/5 text-current' : 'opacity-30 cursor-not-allowed'}"><i data-lucide="chevron-right" class="w-8 h-8"></i></button>
                        </div>
                    </div>
                `;
            },
            
            fcShareDeck() {
                const encoded = btoa(encodeURIComponent(JSON.stringify(state.cards)));
                const url = `${window.location.origin}${window.location.pathname}?data=${encoded}`;
                
                const textArea = document.createElement("textarea");
                textArea.value = url;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    const textEl = document.getElementById('share-text');
                    const iconEl = document.getElementById('share-icon');
                    textEl.innerText = "Copied!";
                    iconEl.setAttribute('data-lucide', 'check');
                    document.getElementById('share-btn').classList.add('text-green-500');
                    lucide.createIcons();
                    
                    setTimeout(() => {
                        textEl.innerText = "Share";
                        iconEl.setAttribute('data-lucide', 'share-2');
                        document.getElementById('share-btn').classList.remove('text-green-500');
                        lucide.createIcons();
                    }, 2000);
                } catch (err) {}
                document.body.removeChild(textArea);
            }
        };

        // Boot
        window.addEventListener('DOMContentLoaded', () => window.app.init());

    </script>
</body>
</html>
